<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全过程人民民主参与人格测试</title>
    <style>
        :root {
            --primary-green: #7A9D8C; /* 自然绿 */
            --bg-cream: #F9F7F2;    /* 奶油底色 */
            --text-wood: #4A3E3E;   /* 木质褐 */
            --accent-gold: #D4AF37;
        }

        body {
            font-family: "Source Han Serif CN", "Songti SC", serif;
            background-color: var(--bg-cream);
            color: var(--text-wood);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        #app {
            width: 90%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
            border: 1px solid rgba(122, 157, 140, 0.2);
        }

        .fade-in { animation: fadeIn 0.8s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        button {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 12px 0;
            border: 1px solid var(--primary-green);
            background: transparent;
            color: var(--text-wood);
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1rem;
        }

        button:hover {
            background: var(--primary-green);
            color: white;
        }

        .progress {
            font-size: 0.8rem;
            color: var(--primary-green);
            margin-bottom: 20px;
        }

        .result-card {
            padding: 20px;
            border: 2px solid var(--accent-gold);
            border-radius: 15px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div id="app" class="fade-in">
    </div>

<script>
    const questions = [
        { q: "1. 社区/学校要征集公共事务意见，你通常会？", options: ["A 主动认真填写，还会提具体建议", "B 看看内容，理性表达观点", "C 别人参与我就参与，随大流", "D 不太关注，直接跳过"], keys: ['A', 'B', 'C', 'D'] },
        // ... 此处省略 2-15 题，逻辑一致
        { q: "16. 总体而言，你对全过程人民民主的态度是？", options: ["A 认同且支持，愿意参与", "B 认同但参与不多", "C 一般，无感", "D 不了解、不评价"], keys: ['A', 'B', 'C', 'D'] }
    ];

    // 为了演示简化，这里手动补齐逻辑或循环生成
    // 实际使用时请将16道题完整录入
    const results = {
        A: { title: "👑 民主领航者", keywords: "积极、主动、担当、表达", desc: "你是公共事务中的积极参与者，是民主实践中的核心带动者。" },
        B: { title: "📊 理性协商家", keywords: "客观、公正、逻辑、审慎", desc: "你注重程序正义与结果公平，是高质量民主协商中的理性力量。" },
        C: { title: "🤝 温和同行者", keywords: "友善、包容、随和、稳定", desc: "你尊重集体选择，是社会共识与和谐氛围的重要支撑。" },
        D: { title: "☕ 自在生活家", keywords: "淡然、佛系、简单、自洽", desc: "你关注日常生活，对公共事务保持适度距离，是社会安宁的基础。" }
    };

    let currentIndex = 0;
    let scores = { A: 0, B: 0, C: 0, D: 0 };

    const app = document.getElementById('app');

    function showStart() {
        app.innerHTML = `
            <h1>🗳️</h1>
            <h2>你的民主参与人格是什么？</h2>
            <p>全过程人民民主趣味测试</p>
            <button onclick="startTest()">开始探索</button>
        `;
    }

    function startTest() {
        showQuestion();
    }

    function showQuestion() {
        const item = questions[currentIndex] || questions[0]; // 示例逻辑
        app.innerHTML = `
            <div class="progress">Question ${currentIndex + 1} / 16</div>
            <h3>${item.q}</h3>
            ${item.options.map((opt, i) => `<button onclick="next('${item.keys[i]}')">${opt}</button>`).join('')}
        `;
    }

    function next(key) {
        scores[key]++;
        currentIndex++;
        if (currentIndex < 16) {
            showQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        // 找到得分最高的Key
        const finalKey = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
        const res = results[finalKey];
        
        app.innerHTML = `
            <div class="fade-in">
                <h2>测试结果</h2>
                <div class="result-card">
                    <h1 style="color:var(--primary-green)">${res.title}</h1>
                    <p><strong>关键词：</strong>${res.keywords}</p>
                    <hr style="border: 0.5px solid #eee">
                    <p>${res.desc}</p>
                </div>
                <button onclick="location.reload()" style="margin-top:30px">重新测试</button>
            </div>
        `;
    }

    showStart();
</script>

</body>
</html>
